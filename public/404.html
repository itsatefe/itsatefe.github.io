<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting...</title>
    <script>
      (function () {
        var location = window.location;
        var path = location.pathname;
        var redirect = location.origin + "/#redirect=" + encodeURIComponent(path + location.search + location.hash);
        location.replace(redirect);
      })();
    </script>
  </head>
  <body></body>
</html>
