      (function () {
        var hash = window.location.hash;
        var prefix = "#redirect=";
        if (hash && hash.indexOf(prefix) === 0) {
          var target = decodeURIComponent(hash.slice(prefix.length));
          window.history.replaceState(null, "", target);
        }
      })();
    </script>
